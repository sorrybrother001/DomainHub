{% extends "base.html" %}
{% block content %}
<h3>Wallets</h3>
<div class="row">
  {% for w in wallets %}
  <div class="col-md-4">
    <div class="card p-3 mb-3">
      <h5>{{ w.currency }}</h5>
      <p>Balance: {{ w.balance }}</p>
      <a class="btn btn-sm btn-primary" href="{{ url_for('wallet.transfer') }}">Send</a>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}

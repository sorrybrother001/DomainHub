{% extends "base.html" %}
{% block content %}
<h2>Admin Dashboard</h2>
<table class="table">
  <thead><tr><th>ID</th><th>Email</th><th>Created</th></tr></thead>
  <tbody>
    {% for u in users %}
      <tr><td>{{ u.id }}</td><td>{{ u.email }}</td><td>{{ u.created_at }}</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
